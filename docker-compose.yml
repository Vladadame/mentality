services:
  pg:
    image: postgres:16-alpine
    container_name: mentality_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    container_name: mentality_api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./api:/app
    command: >
      sh -lc "pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DB_HOST: pg
      DB_PORT: 5432
      DB_NAME: booking
      DB_USER: booking
      DB_PASSWORD: booking
      BASE_URL: http://localhost:8000
      WFP_MERCHANT_ACCOUNT: test_merch_n1
      WFP_SECRET_KEY: test_secret
      WFP_DOMAIN: localhost
    depends_on:
      - pg

volumes:
  pg_data: